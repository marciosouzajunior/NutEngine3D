[env:nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
upload_protocol = arduino
upload_port = COM5
upload_speed = 115200
build_src_filter =
    +<main.cpp>
    +<NanoEngineRuntime.cpp>
    +<NanoNoHeap.cpp>
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.12.6
    adafruit/Adafruit SSD1306 @ ^2.5.17
build_flags =
    -I../../src
    -I../../build/assets/nano
    -DNUT_FW_TAG=\"scene-active\"
